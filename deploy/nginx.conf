# ============================================================
#  Nginx Reverse Proxy — e-Bupot Portal
#  Lokasi di VPS: /etc/nginx/sites-available/ebupot
#  Aktifkan:  sudo ln -s /etc/nginx/sites-available/ebupot /etc/nginx/sites-enabled/
#             sudo nginx -t && sudo systemctl reload nginx
#  SSL:       sudo certbot --nginx -d ebupot.domainanda.com
# ============================================================

server {
    listen 80;
    server_name ebupot.domainanda.com;

    # Redirect HTTP -> HTTPS (setelah certbot dijalankan, baris ini otomatis)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ebupot.domainanda.com;

    # SSL (otomatis diisi oleh certbot)
    # ssl_certificate /etc/letsencrypt/live/ebupot.domainanda.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/ebupot.domainanda.com/privkey.pem;

    # Upload file besar (100MB)
    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout untuk upload file besar
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
