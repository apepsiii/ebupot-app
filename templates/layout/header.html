<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.title}} - Admin e-Bupot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/public/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex" id="wrapper">
        <!-- Sidebar -->
        <div class="bg-dark border-end" id="sidebar-wrapper">
            <div class="sidebar-heading text-white py-4 px-3 text-center">
                <i class="bi bi-file-earmark-pdf-fill text-primary"></i>
                <h5 class="d-inline ms-2">e-Bupot</h5>
            </div>
            <div class="list-group list-group-flush">
                <a href="/admin/dashboard" class="list-group-item list-group-item-action bg-dark text-light border-0 {{if eq .active "dashboard"}}active{{end}}">
                    <i class="bi bi-speedometer2"></i> Dashboard
                </a>
                <a href="/admin/users" class="list-group-item list-group-item-action bg-dark text-light border-0 {{if eq .active "users"}}active{{end}}">
                    <i class="bi bi-people"></i> Manajemen User
                </a>
                <a href="/admin/ebupots" class="list-group-item list-group-item-action bg-dark text-light border-0 {{if eq .active "ebupots"}}active{{end}}">
                    <i class="bi bi-folder"></i> Manajemen e-Bupot
                </a>
                <a href="/admin/settings" class="list-group-item list-group-item-action bg-dark text-light border-0 {{if eq .active "settings"}}active{{end}}">
                    <i class="bi bi-gear"></i> Pengaturan
                </a>
                <a href="/logout" class="list-group-item list-group-item-action bg-dark text-light border-0 text-danger">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </a>
            </div>
        </div>

        <!-- Page Content -->
        <div id="page-content-wrapper" class="bg-light flex-grow-1">
            <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm px-4 py-3">
                <div class="d-flex align-items-center">
                    <button class="btn btn-sm btn-outline-secondary me-3 d-md-none" id="sidebarToggle">
                        <i class="bi bi-list"></i>
                    </button>
                    <span class="navbar-brand mb-0 fw-bold">{{.title}}</span>
                </div>
                <div class="ms-auto">
                    <span class="badge bg-primary">
                        <i class="bi bi-person-circle"></i> {{.currentUser.Name}}
                    </span>
                </div>
            </nav>

            <div class="container-fluid p-4">
