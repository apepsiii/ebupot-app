{{template "header.html" .}}

<div class="row g-4 mb-4">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm text-white" style="background: linear-gradient(135deg, #0d6efd, #0a58ca);">
            <div class="card-body d-flex align-items-center">
                <div class="me-3"><i class="bi bi-people-fill" style="font-size: 3rem;"></i></div>
                <div>
                    <h2 class="mb-0">{{.userCount}}</h2>
                    <span>Total Pengguna Terdaftar</span>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card border-0 shadow-sm text-white" style="background: linear-gradient(135deg, #198754, #146c43);">
            <div class="card-body d-flex align-items-center">
                <div class="me-3"><i class="bi bi-folder-fill" style="font-size: 3rem;"></i></div>
                <div>
                    <h2 class="mb-0">{{.ebupotCount}}</h2>
                    <span>Total Dokumen e-Bupot</span>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="card border-0 shadow-sm">
    <div class="card-body">
        <h5 class="card-title fw-bold"><i class="bi bi-lightning"></i> Aksi Cepat</h5>
        <div class="d-flex flex-wrap gap-2 mt-3">
            <a href="/admin/users" class="btn btn-outline-primary"><i class="bi bi-person-plus"></i> Tambah User</a>
            <a href="/admin/ebupots" class="btn btn-outline-success"><i class="bi bi-cloud-upload"></i> Upload Dokumen</a>
        </div>
    </div>
</div>

{{template "footer.html" .}}
