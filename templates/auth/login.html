<!DOCTYPE html>
<html lang="id" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Login | {{.title}}</title>
    <meta name="description" content="Portal Manajemen e-Bupot" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />

    <!--begin::Fonts -->
    <link rel="stylesheet" type="text/css" href="https://static.pajak.go.id/assets/fonts/font.css" />
    <!--end::Fonts -->

    <!--begin::Page Custom Styles -->
    <link href="https://static.pajak.go.id/assets/css/login-1.min.css" rel="stylesheet" type="text/css" />
    <!--end::Page Custom Styles -->

    <!--begin:: Global Mandatory Vendors -->
    <link href="https://static.pajak.go.id/assets/vendors/general/perfect-scrollbar/css/perfect-scrollbar.min.rtl.css" rel="stylesheet" type="text/css" />
    <!--end:: Global Mandatory Vendors -->

    <!--begin:: Global Optional Vendors -->
    <link href="https://static.pajak.go.id/assets/vendors/general/sweetalert2/dist/sweetalert2.min.rtl.css" rel="stylesheet" type="text/css" />
    <link href="https://static.pajak.go.id/assets/vendors/general/@fortawesome/fontawesome-free/css/all.min.css" rel="stylesheet" type="text/css" />
    <!--end:: Global Optional Vendors -->

    <!--begin::Global Theme Styles -->
    <link href="https://static.pajak.go.id/assets/css/djp/style.bundle/base.min.css" rel="stylesheet" type="text/css" />
    <link href="https://static.pajak.go.id/assets/css/djp/style.bundle/typo.min.css" rel="stylesheet" type="text/css" />
    <link href="https://static.pajak.go.id/assets/css/djp/style.bundle/component.min.css" rel="stylesheet" type="text/css" />
    <link href="https://static.pajak.go.id/assets/css/djp/style.bundle/part.min.css" rel="stylesheet" type="text/css" />
    <!--end::Global Theme Styles -->

    <link href="https://static.pajak.go.id/assets/css/custom.css" rel="stylesheet" type="text/css" />
    <link rel="shortcut icon" href="https://static.pajak.go.id/assets/media/logos/favicon.ico" type="image/vnd.microsoft.icon" />

    <meta name="theme-color" content="#212c5f" />
    <script>var ctx = "/"; var cdn = "https://static.pajak.go.id";</script>
</head>
<body class="kt-quick-panel--right kt-demo-panel--right kt-offcanvas-panel--right kt-subheader--fixed kt-subheader--enabled kt-subheader--solid kt-aside--enabled kt-aside--fixed kt-page--loading">

<div class="kt-grid kt-grid--hor kt-grid--root">
    <div class="kt-grid__item kt-grid__item--fluid kt-grid kt-grid--ver kt-page">
        <div class="kt-grid__item kt-grid__item--fluid kt-grid kt-grid--hor kt-wrapper " id="kt_wrapper">
            <div id="body-konten" class="kt-grid__item kt-grid__item--fluid kt-grid kt-grid--ver kt-grid--stretch">
                <style>
                    #body-konten {
                        background: url(https://static.pajak.go.id/assets/media/bg/background-djp.jpg);
                        background-size: cover; background-position: center center;
                    }
                </style>
                <div class="kt-container kt-body kt-grid kt-grid--ver align-items-center" id="kt_body">
                    <div class="grid-djp kt-grid__item kt-grid__item--fluid kt-grid kt-grid--hor" style="padding-top: 0;">
                        <div class="kt-content kt-grid__item kt-grid__item--fluid px-0">
                            <div class="row">
                                <div class="col-12">
                                    <div class="kt-portlet kt-portlet--height-fluid kt-portlet--mobile"
                                         style="background: none; width: 370px; margin-left: auto; margin-right: auto;">
                                        <div class="kt-grid kt-grid--hor kt-grid--root kt-login kt-login--v1" id="kt_login">
                                            <div class="kt-grid__item kt-grid__item--fluid kt-grid kt-grid--desktop kt-grid--ver-desktop kt-grid--hor-tablet-and-mobile">
                                                <div class="kt-grid__item kt-grid__item--fluid kt-grid__item--order-tablet-and-mobile-1 kt-login__wrapper"
                                                     style="background-color: white; padding-top: 35px; padding-bottom: 20px; border-radius: 10px; box-shadow: 0px 4px 20px 0 rgba(0, 0, 0, .07);">
                                                    <div class="kt-login__body">
                                                        <div class="kt-login__form">
                                                            <div class="kt-login__logo w-100 d-flex justify-content-center mb-4">
                                                                <img class="" style="height: 60px" alt="Logo" src="https://static.pajak.go.id/assets/media/logos/Logo DJP.png" />
                                                            </div>
                                                            <div class="kt-login__title mb-3">
                                                                <h5 class="kt-font-bolder text-dark">Login</h5>
                                                            </div>

                                                            <form class="kt-form login-djp" action="/login" method="POST" style="margin-top: 0px; margin-bottom: 0">

                                                                {{if .error}}
                                                                <div class="alert alert-danger" style="font-size: .85rem; padding: .5rem .75rem; border-radius: 6px;" role="alert">
                                                                    <i class="fa fa-exclamation-circle"></i> {{.error}}
                                                                </div>
                                                                {{end}}
                                                                {{if .success}}
                                                                <div class="alert alert-success" style="font-size: .85rem; padding: .5rem .75rem; border-radius: 6px;" role="alert">
                                                                    <i class="fa fa-check-circle"></i> {{.success}}
                                                                </div>
                                                                {{end}}

                                                                <div class="form-group" style="margin-bottom: 1.25rem;">
                                                                    <label style="font-size: .9rem; font-weight: 600; margin-bottom: .25rem; width: 100%">Username</label>
                                                                    <div class="kt-input-icon">
                                                                        <input class="form-control" type="text"
                                                                               placeholder="Masukan username Anda" name="username"
                                                                               autocomplete="off" id="username" autofocus
                                                                               style="border: 1px solid #ccc; background-color: #fff; margin-top: 0;" required />
                                                                    </div>
                                                                </div>

                                                                <div class="form-group" style="margin-bottom: 1.25rem;">
                                                                    <label style="font-size: .9rem; font-weight: 600; margin-bottom: .25rem;">Kata Sandi</label>
                                                                    <div class="kt-input-icon kt-input-icon--right password-djp">
                                                                        <input class="form-control" type="password" required="required"
                                                                               placeholder="Masukan kata sandi Anda" name="password"
                                                                               autocomplete="off" id="password"
                                                                               style="border: 1px solid #ccc; background-color: #fff; margin-top: 0;" required />
                                                                        <span class="kt-input-icon__icon kt-input-icon__icon--right" id="togglePassword" style="cursor: pointer;">
                                                                            <span><i class="fa fa-eye-slash"></i></span>
                                                                        </span>
                                                                    </div>
                                                                </div>

                                                                <div class="kt-login__actions" style="margin-top: 1rem; margin-bottom: 1rem;">
                                                                    <button type="submit" id="btnSubmit"
                                                                            class="btn btn-warning btn-elevate kt-login__btn-primary"
                                                                            style="color: #02275d; font-weight: bold; width: 100%; border-radius: 8px; font-size: 16px;">
                                                                        Selanjutnya
                                                                    </button>
                                                                </div>

                                                                <div class="kt-separator kt-separator--space-sm kt-separator--portlet-fit" style="border-bottom: 1.5px solid rgba(0, 0, 0, 0.12);"></div>

                                                                <div class="kt-login__actions row text-center" style="margin: 0;">
                                                                    <div class="col-md-12" style="padding: 5px 0; margin-top: 10px">
                                                                        <a href="/login" class="btn btn-djp btn-wide" style="width: 100%;"> Kembali Ke Halaman Login</a>
                                                                    </div>
                                                                </div>
                                                            </form>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<noscript>
    <div class="center-noscript">
        <p>Sepertinya javascript Anda tidak aktif. Untuk mengakses halaman ini pastikan javascript Anda aktif.</p>
    </div>
</noscript>

<!--begin:: Global Mandatory Vendors -->
<script src="https://static.pajak.go.id/assets/vendors/general/jquery/dist/jquery.min.js" type="text/javascript"></script>
<script src="https://static.pajak.go.id/assets/vendors/general/popper.js/dist/umd/popper.min.js" type="text/javascript"></script>
<script src="https://static.pajak.go.id/assets/vendors/general/bootstrap/dist/js/bootstrap.min.js" type="text/javascript"></script>
<!--end:: Global Mandatory Vendors -->

<script>
    // Toggle show/hide password
    $(document).ready(function () {
        $("#togglePassword").on("click", function () {
            var input = $("#password");
            var icon = $(this).find("i");
            if (input.attr("type") === "password") {
                input.attr("type", "text");
                icon.removeClass("fa-eye-slash").addClass("fa-eye");
            } else {
                input.attr("type", "password");
                icon.removeClass("fa-eye").addClass("fa-eye-slash");
            }
        });
    });
</script>
</body>
</html>
